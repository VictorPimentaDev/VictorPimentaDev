name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: generate 3d chart (last 6 months)
        run: |
          git clone --depth 1 --branch v0.9.3 https://github.com/yoshi389111/github-profile-3d-contrib.git /tmp/contrib3d
          FROM=$(date -u -d '6 months ago' +%Y-%m-%dT00:00:00.000Z)
          TO=$(date -u +%Y-%m-%dT23:59:59.999Z)
          # ponytail: the action only supports full calendar years (YEAR env);
          # patch its date template for a rolling 6-month window instead
          sed -i 's/\${year}-01-01T00:00:00.000Z/'"$FROM"'/; s/\${year}-12-31T23:59:59.000Z/'"$TO"'/' /tmp/contrib3d/dist/index.js
          node /tmp/contrib3d/dist/index.js
        env:
          # PROFILE_TOKEN (classic PAT, repo scope) lets the language pie see
          # private repos; falls back to the default read-only token
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/3d-settings.json
          YEAR: "1"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git commit -m "chore: update 3d contribution chart" || echo "no changes"
          git push
